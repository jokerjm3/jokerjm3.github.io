<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Circulo estranho</title>
</head>
<body>
  <svg width="1000" height="600" viewBox="0 -150 400 400" style="background: #ffffff;">
   <circle cx="100" cy="100" r="10" fill="#2212cd" stroke-weight="100" stroke="#c80909">
   
  <animate
   attributeName='r' 
      from='50' 
      to='135' 
      dur='2s' 
      repeatCount='indefinite' /></circle> 
  
</svg>

</body>
</html>
